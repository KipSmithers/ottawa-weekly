title: "Final Fantasy Orchestra, 67's Playoffs & Maple Season's Last Hurrah"
publish_date: "2026-04-17"
issue_number: 52
summary: "The Ottawa Pops Orchestra performs a sweeping Final Fantasy VII symphony, the 67's battle in OHL playoff Round 2, the Ottawa Charge host a Pride Celebration game, and Fulton's Sugar Bush closes its doors for the season."
editor_note: "Spring is fully, gloriously here. The trails are open, the patios are calling, and Ottawa has a week packed with reasons to get out and celebrate this city. Let's get into it. 🌱"

featured_event:
  title: "Materia Symphony: Inspired by Final Fantasy VII"
  date_time: "Friday, April 17 (7:30 PM) & Saturday, April 18 (7:00 PM)"
  location: "Carleton Dominion-Chalmers Centre, Ottawa"
  description: "The Ottawa Pops Orchestra brings Materia Symphony to life — a sweeping symphonic work built from the beloved score of Final Fantasy VII, performed with full orchestra and choir. Whether you've never touched a controller or you grew up on Cloud and Aerith, this is the kind of performance that gives you chills. Two nights only, and both are already buzzing. From $40."
  source_url: "https://ottawapops.ca"

highlights:
  - title: "Ottawa Charge vs. New York Sirens — Pride Celebration"
    date_time: "Saturday, April 18 · 2:00 PM"
    location: "TD Place, Lansdowne Park"
    description: "The Ottawa Charge host New York in a Pride Celebration afternoon — women's hockey at its electric best, with a party atmosphere in the house. CBC is broadcasting live. Bring the whole crew or catch it from home."
    source_url: "https://www.thepwhl.com/en/teams/ottawa-charge"

  - title: "Ottawa 67's Playoffs — Round 2, Game 6 vs. Barrie Colts"
    date_time: "Sunday, April 19 · 5:00 PM"
    location: "The Arena at TD Place, Lansdowne Park"
    description: "Playoff hockey at Lansdowne — nothing beats it. The 67's are battling the Barrie Colts in a must-watch Round 2 showdown. The Arena is loud, the stakes are high, and Ottawa is squarely in their corner."
    source_url: "https://tdplace.ca"

  - title: "Arm's Length — There's A Whole World North American Tour"
    date_time: "Tuesday, April 21 · Doors 6:00 PM"
    location: "The Bronson Centre, Ottawa"
    description: "Hamilton emo-indie darlings Arm's Length bring their North American tour to the Bronson, with heavy-hitting support from The Callous Daoboys and Harrison Gordon. A midweek show worth every minute of lost sleep."
    source_url: "https://www.bronsoncentre.ca"

  - title: "Great Canadian Comedy Caravan Tour — NAC Benefit Gala"
    date_time: "Friday, April 24 · 8:00 PM"
    location: "Azrieli Studio, National Arts Centre, 1 Elgin St"
    description: "Laughs for a great cause. The Great Canadian Comedy Caravan returns to the NAC's intimate Azrieli Studio for their 2nd annual benefit gala supporting Ronald McDonald House Ottawa. Hilarious Canadian comedians + community good = the best kind of Friday night."
    source_url: "https://nac-cna.ca"

  - title: "Gatineau Park Spring Trails — Now Open"
    date_time: "All week"
    location: "Gatineau Park, QC (15 min from downtown Ottawa)"
    description: "As of April 15, leashed dogs are welcome back on most trails — and spring in the park is spectacular. Hit the Sugarbush Trail, the Lauriault, or go big with King Mountain for panoramic views. Free."
    source_url: "https://ncc-ccn.gc.ca/places/gatineau-park"

  - title: "Ottawa Farmers' Market — One of the Last Winter Sundays"
    date_time: "Sunday, April 19 · 10:00 AM – 3:00 PM"
    location: "Aberdeen Pavilion, Lansdowne Park"
    description: "One of the final winter market Sundays inside the gorgeous Aberdeen Pavilion. Local meats, artisan cheeses, fresh-baked goods, and spring blooms. The outdoor season returns next month — soak up these last cozy indoor vibes. Free entry."
    source_url: "https://ottawafarmersmarket.ca"

family_corner:
  - title: "Ottawa Parent & Child Expo"
    date_time: "Saturday–Sunday, April 18–19 · 9:00 AM – 4:00 PM"
    location: "Nepean Sportsplex (Entrance 4)"
    description: "Two days of everything families need under one roof — baby gear, kids' activities, local vendors, and workshops for parents. A great spring weekend outing to discover what's new in Ottawa's family world."
    source_url: "https://ottawatourism.ca"

  - title: "Fulton's Sugar Bush — Final Weekend of Maple Season!"
    date_time: "Saturday–Sunday, April 18–19 · 10:00 AM – 4:00 PM · Closes Sunday April 19!"
    location: "399 Sugar Bush Rd, Pakenham, ON"
    description: "Last call! The final weekend at Fulton's legendary 6-generation sugar bush — horse-drawn sleigh rides, maple trail walks, and a pancake house that makes you want to move to Pakenham. Don't let maple season end without one more memory."
    source_url: "https://www.fultons.ca"

  - title: "Art Haven Kanata — Spring Kids' Night"
    date_time: "Friday, April 17"
    location: "Art Haven Kanata, 124-150 Katimavik Rd"
    description: "Drop the kids off for a spring-themed creative evening — pottery painting, seasonal crafts, and treats galore. Parents get a free night; kids make something they'll actually be proud of. $45/child."
    source_url: "https://arthaven.ca"
