title: "Spring Is Here — Rock, ABBA & Playoff Hockey"
publish_date: "2026-03-20"
issue_number: 48
summary: "The equinox arrives, the 67s hit the playoffs, and Friday night offers candlelit orchestral rock at TD Place. Ottawa's best week in a while."
editor_note: "Spring officially lands Thursday, and Ottawa is not being subtle about it. Friday alone has The Rock Orchestra by Candlelight, Corridor at The 27 Club, merengue dancing at the Lusitania, and an organ concert inside Notre Dame Cathedral. Pick your vibe. This city never has just one."

featured_event:
  title: "The Rock Orchestra By Candlelight"
  date_time: "Friday, March 20 · 7:00 PM"
  location: "The Arena at TD Place, Lansdowne Park"
  description: "Queen, Led Zeppelin, Pink Floyd and more reimagined with full orchestra — all by candlelight at Lansdowne. Dramatic, gorgeous, and the perfect way to open a spring weekend. One of those nights Ottawa does quietly but very well."
  source_url: "https://www.ticketmaster.ca/the-rock-orchestra-by-candlelight-ottawa-ontario-03-20-2026/event/310062FCE2275682"

highlights:
  - title: "Corridor + Still Youth"
    date_time: "Friday, March 20 · 7:30 PM"
    location: "The 27 Club, Ottawa"
    description: "Corridor brings their hypnotic, hazy indie rock south from Montreal for a Friday night that'll feel like a secret. Still Youth opens. Small room, big energy."
    source_url: "https://www.ticketmaster.ca/discover/ottawa?categoryId=KZFzniwnSyZfZ7v7nJ"

  - title: "SOS: The ABBA Experience"
    date_time: "Saturday, March 21"
    location: "Algonquin Commons Theatre, 1385 Woodroffe Ave"
    description: "Faithful costumes, spot-on harmonies, all the hits — and they genuinely mean it when they call it interactive. Bring your dancing shoes and your best Waterloo face."
    source_url: "https://www.algonquinsa.com/event/sos-the-abba-experience-march-2026/"

  - title: "Pro Organo Ottawa: Francine Nguyen-Savaria"
    date_time: "Friday, March 20 · 7:30 PM"
    location: "Notre Dame Cathedral Basilica, Ottawa"
    description: "One of Canada's finest organists performs inside one of the most breathtaking spaces in the city. Intimate and exceptional — the kind of Friday night you'll be recommending for months."
    source_url: "https://www.eventbrite.com/e/pro-organo-ottawa-francine-nguyen-savaria-tickets-1425301177189"

  - title: "& Juliet (Touring)"
    date_time: "Thursday, March 26 · 7:30 PM"
    location: "National Arts Centre, 1 Elgin St"
    description: "What if Juliet didn't die? The hit West End musical arrives at the NAC loaded with Max Martin pop bangers. Unapologetically fun, genuinely great."
    source_url: "https://nac-cna.ca/en/tickets"

  - title: "Bol, brown boy, bol"
    date_time: "March 26–27"
    location: "Meridian Theatres @ Centrepointe, 101 Centrepointe Dr"
    description: "A cheeky, heartfelt solo show about reclaiming your voice and cultural identity through tabla. One of the most talked-about local theatre pieces this season. Tickets from $20."
    source_url: "https://www.meridiancentrepointe.com"

  - title: "Ottawa Film Office 2026 Career Fair"
    date_time: "Saturday, March 21 · 9:00 AM"
    location: "Ottawa Art Gallery, 10 Daly Ave"
    description: "Meet industry pros, explore opportunities in Ottawa's growing screen sector, and see what the city is building behind the camera. Free entry — a genuinely useful morning."
    source_url: "https://www.eventbrite.ca/e/the-ottawa-film-offices-2026-career-fair-salon-de-lemploi-2026-tickets-1983402516318"

family_corner:
  - title: "Character Meet-ups at Tanger Ottawa"
    date_time: "Friday–Saturday, March 20–21"
    location: "Tanger Outlets Ottawa, 8555 Campeau Dr"
    description: "Meet PAW Patrol's Marshall & Skye and step into the world of Gabby's Dollhouse. Free to attend, limited spots per session — book ahead. A guaranteed hit with the little ones."
    source_url: "https://www.tanger.com/ottawa/events/21449"

  - title: "March Break Public Skating @ Canadian Tire Centre"
    date_time: "Through Friday, March 20"
    location: "Canadian Tire Centre, 1000 Palladium Dr"
    description: "Last chance to skate on NHL ice this March Break. Advance booking required. A bucket-list moment for young hockey fans — the ice, the scoreboard, the whole deal."
    source_url: "https://www.canadiantirecentre.com/events/detail/public-skating"

  - title: "Ottawa Museums Pass — March Break"
    date_time: "All week"
    location: "9 museums & galleries across Ottawa"
    description: "One pass, nine venues — Canadian Museum of History, Museum of Nature, Bank of Canada Museum (with special hands-on March Break activities), and more. The best-value day out in the city."
    source_url: "https://visitottawapasses.ca/museums"
