title: "Diana Krall, Record Fair & A Concert Inside Rideau Hall"
publish_date: "2026-04-10"
issue_number: 51
summary: "Diana Krall brings her Autumn in New York tour to the NAC for two intimate nights, Ottawa's Record Fair returns for round seven, and the Central Band of the Canadian Armed Forces performs free inside Rideau Hall."
editor_note: "Spring has truly arrived in Ottawa — and the city is making the most of it. This week brings a Grammy-winning jazz icon to the NAC, a vinyl lover's paradise at the Record Fair, lacrosse action at the CTC, a free concert inside the walls of Rideau Hall, and last-chance maple syrup adventures just outside the city. Whether you're into music, outdoor adventure, art, or just a good laugh, the Capital has you covered. 🍁"

featured_event:
  title: "Diana Krall: Autumn in New York Tour"
  date_time: "Friday & Saturday, April 10–11 · 8:00 PM"
  location: "NAC Southam Hall, 1 Elgin St"
  description: "One of jazz's most commanding voices returns to Ottawa for two intimate evenings. The only jazz singer to have eight consecutive albums debut at #1 on the Billboard Jazz chart, Krall is pure magic: smoky piano, velvet vocals, and a presence that fills every seat. This two-night run is already the talk of the city. Don't wait on tickets. From $88."
  source_url: "https://nac-cna.ca"

highlights:
  - title: "Ottawa Record Fair VII"
    date_time: "Saturday, April 11 · Early bird 10 AM / General 11 AM"
    location: "Carleton Dominion-Chalmers Centre, 355 Cooper St"
    description: "Ottawa's beloved Record Fair returns for its seventh edition. Dozens of dealers bring walls of vinyl — rare, classic, local, and everything in between. Early bird entry gives collectors first dibs. A perfect Saturday morning ritual."
    source_url: "https://ottawarecordfair.com"

  - title: "Ottawa Black Bears vs. Toronto Rock"
    date_time: "Friday, April 10 · 7:30 PM"
    location: "Canadian Tire Centre, 1000 Palladium Dr"
    description: "Fast, fierce, and wildly entertaining — professional box lacrosse is Ottawa's best-kept sports secret. The Black Bears face the Toronto Rock in a playoff-intensity showdown. Grab the family and get loud in Kanata."
    source_url: "https://ottawablackbears.com"

  - title: "Maestro: Competitive Improv Comedy"
    date_time: "Saturday, April 11 · Evening"
    location: "Arts Court, 2 Daly Ave"
    description: "Ten of Ottawa's best improvisers walk in; only one walks out with the $5 bill and the glory. Wayward Improvised Theatre's Maestro format is genuinely funny, audience-driven, and completely unpredictable. Perfect date-night outing."
    source_url: "https://waywardtheatre.ca"

  - title: "New Orford String Quartet: Dedications"
    date_time: "Saturday, April 11"
    location: "Ottawa Chamberfest venue"
    description: "The acclaimed New Orford String Quartet returns with Dedications, an evening of chamber masterworks. Chamberfest's spring series consistently delivers world-class performances in intimate settings — a true treat for music lovers."
    source_url: "https://chamberfest.com"

  - title: "Crescendo Concert Series at Rideau Hall"
    date_time: "Saturday, April 11 · 2:00–3:00 PM"
    location: "Rideau Hall Ballroom, 1 Sussex Dr"
    description: "A rare and magical opportunity: the Central Band of the Canadian Armed Forces performs in the elegant Ballroom at Rideau Hall. One of Ottawa's most intimate live music experiences. Free — register at gg.ca before spots fill."
    source_url: "https://gg.ca"

family_corner:
  - title: "Alone in the Dark: Paranormal Tour"
    date_time: "Saturday, April 11 · Evening"
    location: "Cumberland Heritage Village Museum, 2940 Old Montreal Rd"
    description: "Explore the historic buildings of Cumberland Heritage Village by night in an immersive guided paranormal tour. Part history, part spine-tingling adventure — not your typical Saturday night, and that's exactly the point."
    source_url: "https://www.cumberlandheritage.ca"

  - title: "Travel & Vacation Show"
    date_time: "Saturday–Sunday, April 11–12"
    location: "Rogers Centre Ottawa, 55 Colonel By Dr"
    description: "Dream big about your summer adventures. Travel experts, tour operators, and destination reps from around the globe under one roof. Perfect for planning your next family escape."
    source_url: "https://ottawatourism.ca"

  - title: "Ottawa Art Gallery — Free Admission"
    date_time: "All week"
    location: "Ottawa Art Gallery, 10 Daly Ave"
    description: "Always free, always worth it. The current Leah Decter exhibition Repair & Care is a thoughtful meditation on land and reconciliation — accessible and moving for all ages. Running through May 12."
    source_url: "https://www.oag.ca"
