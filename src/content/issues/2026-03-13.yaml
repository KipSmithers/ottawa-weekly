title: "March Break & Moonlit Snowshoes"
publish_date: "2026-03-13"
issue_number: 38
summary: "March Break is here, the sugar shacks are running, and Ottawa is in full swing with world-class dance, live music, and guided moonlit snowshoes in Gatineau Park."
editor_note: "What a week to be in the capital. March Break is here, the sugar shacks are running, and Ottawa is in full swing with world-class dance, live music from coast to coast, and guided moonlit snowshoes in Gatineau Park. Spring is whispering, the city is answering. Let's go. 🍁"

featured_event:
  title: "Vías — Contemporary Dance at Carleton Dominion-Chalmers Centre"
  date_time: "March 13–14 · 8:00 PM"
  location: "Carleton Dominion-Chalmers Centre, Ottawa"
  description: "Two breathtaking nights of contemporary Canadian dance, presented by the National Arts Centre. Vías is a bold, visually stunning work that moves between tradition and the cutting edge — exactly the kind of performance that reminds you why Ottawa punches way above its weight as a cultural city."
  source_url: "https://nac-cna.ca"

highlights:
  - title: "Snowshoes Under the Stars — Gatineau Park"
    date_time: "Fridays through March 27 · Evening"
    location: "Gatineau Park"
    description: "Hike through Gatineau's moonlit trails with a Friends of Gatineau Park nature interpreter. Discover how animals survive winter — and fall a little in love with this city's backyard."
    source_url: "https://ncc-ccn.gc.ca/places/gatineau-park"

  - title: "A Tribute to Leonard Cohen"
    date_time: "Friday, March 13 · 7:00 PM"
    location: "Ottawa"
    description: "A live orchestral tribute to the poet laureate of Canadian music. Pull up a chair, pour something warm, and let Hallelujah wash over the room."
    source_url: "https://ottawatourism.ca/en/event-calendar"

  - title: "Music of the Night — A Celebration of Andrew Lloyd Webber"
    date_time: "Sunday, March 15 · 7:30 PM"
    location: "Algonquin Commons Theatre, 1385 Woodroffe Ave"
    description: "A nationally celebrated concert production featuring the greatest hits from Phantom of the Opera, Cats, Evita, and more. An unmissable night for musical theatre fans."
    source_url: "https://www.algonquinsa.com"

  - title: "William Prince – Further From the Country Tour"
    date_time: "Friday, March 20"
    location: "NAC Southam Hall, 1 Elgin St"
    description: "Two-time JUNO Award-winning Peguis First Nation singer-songwriter William Prince plays Southam Hall with special guest Boy Golden. One of the most beautiful voices in Canadian music — don't sleep on this one."
    source_url: "https://nac-cna.ca"

  - title: "Thursday Night Live — National Gallery of Canada"
    date_time: "Thursday, March 19 · 5:00–8:00 PM"
    location: "National Gallery of Canada, 380 Sussex Dr"
    description: "Every Thursday the Gallery transforms into a lively art-and-music evening. Free art-making activities, a vibrant atmosphere, and world-class art on the walls. Perfect date night."
    source_url: "https://www.gallery.ca"

  - title: "Grand Eid Bazaar Ottawa"
    date_time: "Saturday, March 14 · 11:00 AM – 7:00 PM"
    location: "Ottawa"
    description: "Ottawa's biggest Eid celebration — vendors, food, crafts, and community spirit filling the room all day. A joyful afternoon for the whole family."
    source_url: "https://ottawatourism.ca/en/event-calendar"

family_corner:
  - title: "Maple Fest at Proulx Farm"
    date_time: "Running through April"
    location: "Ferme Proulx, Cumberland"
    description: "Pancake house, sugar bush tours, wagon rides, petting farm, and all the maple syrup you can handle. A classic Ottawa spring rite — running through April."
    source_url: "https://www.proulxfarm.com"

  - title: "Canada Agriculture and Food Museum — March Break"
    date_time: "Through March 22"
    location: "Canada Agriculture and Food Museum, Prince of Wales Dr"
    description: "March Break comes alive with newborn lambs, calves, rabbits, and hands-on activities. Make maple oat cookies, do crafts, and meet the animals. Through March 22."
    source_url: "https://ingeniumcanada.org/agriculture"

  - title: "Bank of Canada Museum — Free March Break Activities"
    date_time: "Through March 20"
    location: "Bank of Canada Museum, 30 Bank St"
    description: "Free crafts and interactive exhibits about bank note design and counterfeiting — more fascinating than it sounds, we promise."
    source_url: "https://www.bankofcanadamuseum.ca"
